  const fields = ["absolute_slope", "distance_to_source", "pop_density", "impervious_density", "canopy_ratio", "richness_150m", "shannon_150m", "riparian_width", "total_crossings", "underground_ratio", "sinuosity", "stop_count", "poi_count", "slowmob_length", "carbon_sequest", "lst", "visibility_ratio"];
  const stats = {"absolute_slope": {"q": [0.0030481465657535164, 0.006322021484365449]}, "distance_to_source": {"q": [1766.6666666666658, 4300.0]}, "pop_density": {"q": [1078.859619140625, 2379.298095703125]}, "impervious_density": {"q": [7.014922168545356, 20.723894179894177]}, "canopy_ratio": {"q": [0.11567073022980735, 0.4484714095088145]}, "richness_150m": {"q": [3.0, 3.0]}, "shannon_150m": {"q": [0.36975240929317693, 0.6738688593704512]}, "riparian_width": {"q": [77.0, 104.0]}, "total_crossings": {"q": [0.0, 2.0]}, "underground_ratio": {"q": [0.10152879991476949, 0.7347409157929848]}, "sinuosity": {"q": [1.0102444882247408, 1.0651937824906468]}, "stop_count": {"q": [0.0, 0.828806993012387]}, "poi_count": {"q": [8.657814434426703, 25.56407650981071]}, "slowmob_length": {"q": [12.096556592051524, 32.03669886360032]}, "carbon_sequest": {"q": [0.02486950928966205, 0.040678274631500234]}, "lst": {"q": [30.107013512706203, 33.155222667475755]}, "visibility_ratio": {"q": [0.7069157983422353, 0.830946413116366]}};

  const map = L.map('map', { zoomControl: true });

  const osm = L.tileLayer('https://{s}.tile.openstreetmap.org/{z}/{x}/{y}.png', {
    attribution: '&copy; OpenStreetMap contributors',
    maxZoom: 19
  }).addTo(map);

  const cartoPositron = L.tileLayer('https://{s}.basemaps.cartocdn.com/light_all/{z}/{x}/{y}{r}.png', {
    attribution: '&copy; OpenStreetMap contributors &copy; CARTO',
    subdomains: 'abcd',
    maxZoom: 20
  });

  const cartoDarkMatter = L.tileLayer('https://{s}.basemaps.cartocdn.com/dark_all/{z}/{x}/{y}{r}.png', {
    attribution: '&copy; OpenStreetMap contributors &copy; CARTO',
    subdomains: 'abcd',
    maxZoom: 20
  });

  // 3-class quantile palette
  const colors = ['#2c7fb8', '#fdae61', '#d7191c'];

  function colorFor(field, value) {
    if (value === null || value === undefined || Number.isNaN(value)) return '#bdbdbd';
    const q = (stats[field] && stats[field].q) ? stats[field].q : [];
    if (q.length !== 2) return colors[1];
    if (value <= q[0]) return colors[0];
    if (value <= q[1]) return colors[1];
    return colors[2];
  }

  function fmt(v) {
    if (v === null || v === undefined) return 'NULL';
    if (typeof v !== 'number') return String(v);
    return Number(v).toFixed(6).replace(/\.?0+$/, '');
  }

  const overlays = {};
  let initialLayer = null;

  fields.forEach((field, idx) => {
    const layer = L.geoJSON(data, {
      style: (feature) => {
        const value = feature.properties ? feature.properties[field] : null;
        return { color: colorFor(field, value), weight: 3, opacity: 0.9 };
      },
      onEachFeature: (feature, lyr) => {
        const p = feature.properties || {};
        const idText = (p.segment100_id !== undefined) ? `<div><b>segment100_id:</b> ${p.segment100_id}</div>` : '';
        lyr.bindTooltip(`
          <div>
            ${idText}
            <div><b>Variable:</b> ${field}</div>
            <div><b>Value:</b> ${fmt(p[field])}</div>
          </div>
        `, { sticky: true });
      }
    });

    overlays[field] = layer;
    if (idx === 0) {
      layer.addTo(map);
      initialLayer = layer;
    }
  });

  const baseMaps = {
    'OpenStreetMap': osm,
    'CartoDB Positron': cartoPositron,
    'CartoDB Dark Matter': cartoDarkMatter
  };

  L.control.layers(baseMaps, overlays, { collapsed: false }).addTo(map);

  if (initialLayer) {
    map.fitBounds(initialLayer.getBounds(), { padding: [20, 20] });
  }

  // keep only one variable layer visible
  map.on('overlayadd', function(e) {
    Object.entries(overlays).forEach(([name, lyr]) => {
      if (lyr !== e.layer && map.hasLayer(lyr)) map.removeLayer(lyr);
    });
    updateLegend(Object.keys(overlays).find(k => overlays[k] === e.layer));
  });

  const legend = L.control({ position: 'bottomright' });
  legend.onAdd = function() {
    const div = L.DomUtil.create('div', 'legend');
    div.id = 'legend';
    return div;
  };
  legend.addTo(map);

  function updateLegend(field) {
    if (!field) return;
    const q = (stats[field] && stats[field].q) ? stats[field].q : [];
    const lines = [];
    lines.push(`<div><b>${field}</b></div>`);
    if (q.length === 2) {
      const labels = [
        `Low (<= ${fmt(q[0])})`,
        `Medium (${fmt(q[0])} - ${fmt(q[1])})`,
        `High (> ${fmt(q[1])})`
      ];
      for (let i = 0; i < 3; i++) {
        lines.push(`<div class="row"><span class="sw" style="background:${colors[i]}"></span><span>${labels[i]}</span></div>`);
      }
      lines.push(`<div class="row"><span class="sw" style="background:#bdbdbd"></span><span>NULL</span></div>`);
    } else {
      lines.push('<div>No numeric distribution available</div>');
    }
    document.getElementById('legend').innerHTML = lines.join('');
  }

  if (fields.length > 0) updateLegend(fields[0]);
